            - paragraph [ref=f1e160]:
              - text: Playwright is an
              - link "open-source" [ref=f1e161] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Open-source
              - text: automation library for browser testing and
              - link "web scraping" [ref=f1e162] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Web_scraping
              - superscript [ref=f1e163]:
                - link "[3]" [ref=f1e164] [cursor=pointer]:
                  - /url: "#cite_note-3"
              - text: developed by
              - link "Microsoft" [ref=f1e165] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Microsoft
              - superscript [ref=f1e166]:
                - link "[4]" [ref=f1e167] [cursor=pointer]:
                  - /url: "#cite_note-4"
              - superscript [ref=f1e168]:
                - link "[5]" [ref=f1e169] [cursor=pointer]:
                  - /url: "#cite_note-5"
              - text: and launched on 31 January 2020, which has since become popular among
              - link "programmers" [ref=f1e170] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Programmer
              - text: and
              - link "web developers" [ref=f1e171] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Web_developer
              - text: .
            - paragraph [ref=f1e172]:
              - text: Playwright provides the ability to automate browser tasks in
              - link "Chromium" [ref=f1e173] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Chromium_(web_browser)
              - text: ","
              - link "Firefox" [ref=f1e174] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Firefox
              - text: ", and"
              - link "WebKit" [ref=f1e175] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/WebKit
              - text: with a single API.
              - superscript [ref=f1e176]:
                - link "[6]" [ref=f1e177] [cursor=pointer]:
                  - /url: "#cite_note-6"
              - text: It can also operate against branded browsers such as
              - link "Google Chrome" [ref=f1e178] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Google_Chrome
              - text: and
              - link "Microsoft Edge" [ref=f1e179] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Microsoft_Edge
              - text: available on the host machine, although these browsers are not installed by default. The current Playwright version supports Stable, Beta, Dev, and Canary channels of Google Chrome and Microsoft Edge.
              - superscript [ref=f1e180]:
                - link "[7]" [ref=f1e181] [cursor=pointer]:
                  - /url: "#cite_note-7"
              - text: This allows developers to create reliable end-to-end tests that are capable of running in non-headless mode, as well as in headless mode for automation.
            - paragraph [ref=f1e182]:
              - text: Playwright supports programming languages like
              - link "JavaScript" [ref=f1e183] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/JavaScript
              - text: ","
              - link "Python" [ref=f1e184] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Python_(programming_language)
              - text: ","
              - link "C#" [ref=f1e185] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/C_Sharp_(programming_language)
              - text: and
              - link "Java" [ref=f1e186] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Java_(software_platform)
              - text: ", though its main API was originally written in"
              - link "Node.js" [ref=f1e187] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Node.js
              - text: . It supports all modern web features including network interception and multiple browser contexts and provides automatic waiting, which reduces the flakiness of tests.
          - region [ref=f1e188]:
            - generic [ref=f1e189]:
              - heading "@playwright/test" [level=2] [ref=f1e190]
              - generic [ref=f1e191]:
                - link "edit":
                  - /url: /w/index.php?title=Playwright_(software)&action=edit&section=1
            - paragraph [ref=f1e192]:
              - text: "@playwright/test is a test runner with Jest-like assertions"
              - superscript [ref=f1e193]:
                - link "[8]" [ref=f1e194] [cursor=pointer]:
                  - /url: "#cite_note-8"
              - text: developed and maintained by the Playwright team that is built on top of the Playwright API. This test runner is tightly integrated with Playwright and is specifically designed for end-to-end testing.
              - superscript [ref=f1e195]:
                - link "[9]" [ref=f1e196] [cursor=pointer]:
                  - /url: "#cite_note-9"
              - text: It has capabilities like browser-specific tests, parallel test execution,
              - superscript [ref=f1e197]:
                - link "[10]" [ref=f1e198] [cursor=pointer]:
                  - /url: "#cite_note-10"
              - text: rich browser context options, snapshot testing, automatic retries and many more.
          - region [ref=f1e199]:
            - generic [ref=f1e200]:
              - heading "History" [level=2] [ref=f1e201]
              - generic [ref=f1e202]:
                - link "edit":
                  - /url: /w/index.php?title=Playwright_(software)&action=edit&section=2
            - paragraph [ref=f1e203]:
              - text: Playwright was announced by Microsoft in January 2020.
              - superscript [ref=f1e204]:
                - link "[11]" [ref=f1e205] [cursor=pointer]:
                  - /url: "#cite_note-11"
              - text: It was developed to address the need for a unified API for cross-browser testing and to overcome limitations in existing tools like
              - link "Puppeteer" [ref=f1e206] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Puppeteer_(software)
              - text: ","
              - link "Cypress" [ref=f1e207] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Cypress_(software)
              - text: and
              - link "Selenium" [ref=f1e208] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Selenium_(software)
              - text: . A team of engineers, including those who had previously worked on Puppeteer at
              - link "Google" [ref=f1e209] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Google
              - text: ", contributed to its development."
              - superscript [ref=f1e210]:
                - link "[12]" [ref=f1e211] [cursor=pointer]:
                  - /url: "#cite_note-12"
              - text: Playwright introduced features like automatic waits, multi-browser support, and network interception, making it a powerful tool for modern web testing. Since its inception, it has been actively maintained and has seen rapid growth and adoption in the web testing community.
              - superscript [ref=f1e212]:
                - link "[13]" [ref=f1e213] [cursor=pointer]:
                  - /url: "#cite_note-13"
            - paragraph [ref=f1e214]: The @playwright/test runner was released later as part of an effort to provide a more comprehensive solution for browser-based testing. Its development was largely based on the need to have a specialized runner that can leverage the full potential of the Playwright API and make end-to-end testing more robust and straightforward.
          - region [ref=f1e215]:
            - generic [ref=f1e216]:
              - heading "Usage and examples" [level=2] [ref=f1e217]
              - generic [ref=f1e218]:
                - link "edit":
                  - /url: /w/index.php?title=Playwright_(software)&action=edit&section=3
            - paragraph [ref=f1e219]: "Playwright is primarily used for automating browser tasks, which can range from simple page navigation and content scraping to more complex operations like automated form submissions, user interactions and more. For instance, a simple JavaScript code snippet using Playwright might look like:"
            - generic [ref=f1e220]: "const { chromium } = require('playwright'); (async () => { const browser = await chromium.launch(); const page = await browser.newPage(); await page.goto('https://example.com'); await page.screenshot({ path: 'example.png' }); await browser.close(); })();"
            - paragraph [ref=f1e222]:
              - text: In this example, Playwright is used to open a Chromium browser, navigate to
              - code [ref=f1e223]:
                - link "https://example.com" [ref=f1e224] [cursor=pointer]:
                  - /url: https://example.com
              - text: ", take a screenshot and save it as"
              - code [ref=f1e225]: example.png
              - text: .
            - paragraph [ref=f1e226]: "@playwright/test further extends these capabilities by providing a test runner that allows developers to write and organize their tests in a more structured and scalable manner. An example test using @playwright/test might look like:"
            - generic [ref=f1e227]: "const { test } = require('@playwright/test'); test('basic test', async ({ page }) => { await page.goto('https://example.com'); await expect(page).toHaveTitle('Example Domain'); });"
            - paragraph [ref=f1e229]:
              - text: In this example, a test is written to navigate to
              - code [ref=f1e230]:
                - link "https://example.com" [ref=f1e231] [cursor=pointer]:
                  - /url: https://example.com
              - text: and check that the title of the page is "Example Domain".
              - superscript [ref=f1e232]:
                - link "[14]" [ref=f1e233] [cursor=pointer]:
                  - /url: "#cite_note-14"
            - region [ref=f1e234]:
              - generic [ref=f1e235]:
                - heading "Configuration" [level=3] [ref=f1e236]
                - generic [ref=f1e237]:
                  - link "edit":
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=4
              - paragraph [ref=f1e238]: "Playwright tests can be customized using a configuration file (playwright.config.js) that supports various options including:"
              - list [ref=f1e239]:
                - listitem [ref=f1e240]: Test timeout settings
                - listitem [ref=f1e241]: Retry attempts for failed tests
                - listitem [ref=f1e242]: Screenshot and video capture settings
                - listitem [ref=f1e243]: Headless mode configuration
                - listitem [ref=f1e244]: Test parallelization options
              - paragraph [ref=f1e245]: "An example configuration might look like:"
              - generic [ref=f1e246]: "module.exports = { testDir: './tests', timeout: 30000, retries: 2, use: { headless: true, screenshot: 'only-on-failure', video: 'retain-on-failure', }, };"
            - region [ref=f1e248]:
              - generic [ref=f1e249]:
                - heading "Debugging features" [level=3] [ref=f1e250]
                - generic [ref=f1e251]:
                  - link "edit":
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=5
              - paragraph [ref=f1e252]: "Playwright includes built-in debugging capabilities such as:"
              - list [ref=f1e253]:
                - listitem [ref=f1e254]: Screenshots captured on test failures
                - listitem [ref=f1e255]: Video recording of test runs
                - listitem [ref=f1e256]: Trace viewer for detailed step-by-step analysis
                - listitem [ref=f1e257]: Debug mode with browser inspector
                - listitem [ref=f1e258]:
                  - text: Console logs and network request monitoring
                  - superscript [ref=f1e259]:
                    - link "[15]" [ref=f1e260] [cursor=pointer]:
                      - /url: "#cite_note-15"
            - region [ref=f1e261]:
              - generic [ref=f1e262]:
                - heading "Reporters" [level=3] [ref=f1e263]
                - generic [ref=f1e264]:
                  - link "edit":
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=6
              - paragraph [ref=f1e265]: Reporters in Playwright define how test results are captured, aggregated, and surfaced after execution. They turn raw test events into structured output such as logs, files, dashboards, or external integrations, enabling teams to analyze trends, spot regressions, and debug failures more effectively.
              - paragraph [ref=f1e266]: By centralizing errors, timings, traces, screenshots, and metadata, reporters make it easier to understand why tests failed, not just that they failed.
              - paragraph [ref=f1e267]:
                - text: Playwright includes built-in reporters
                - superscript [ref=f1e268]:
                  - link "[16]" [ref=f1e269] [cursor=pointer]:
                    - /url: "#cite_note-16"
                - text: and exposes a reporter API
                - superscript [ref=f1e270]:
                  - link "[17]" [ref=f1e271] [cursor=pointer]:
                    - /url: "#cite_note-17"
                - text: that supports both open-source and commercial implementations, which are listed below.
              - list [ref=f1e272]:
                - listitem [ref=f1e273]:
                  - link "Monocart Reporter" [ref=f1e274] [cursor=pointer]:
                    - /url: https://github.com/cenfun/monocart-reporter
                - listitem [ref=f1e275]:
                  - link "Currents" [ref=f1e276] [cursor=pointer]:
                    - /url: https://currents.dev/
                - listitem [ref=f1e277]:
                  - link "ReportPortal" [ref=f1e278] [cursor=pointer]:
                    - /url: https://reportportal.io/
                - listitem [ref=f1e279]:
                  - link "Allure Report" [ref=f1e280] [cursor=pointer]:
                    - /url: https://allurereport.org/
            - region [ref=f1e281]:
              - generic [ref=f1e282]:
                - heading "Usage Trends" [level=3] [ref=f1e283]
                - generic [ref=f1e284]:
                  - link "edit":
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=7
              - paragraph [ref=f1e285]:
                - text: As of 2025, Playwright is reported to have over 75,000 GitHub stars, more than 20 million NPM
                - superscript [ref=f1e286]:
                  - link "[18]" [ref=f1e287] [cursor=pointer]:
                    - /url: "#cite_note-18"
                - text: all‑time downloads, and over 11,000 Stack Overflow questions. It has been described as experiencing the fastest growth in community adoption, GitHub stars, and modern usage among major web testing frameworks.
              - table [ref=f1e288]:
                - caption [ref=f1e289]: Data Insights (Playwright 2025)
                - rowgroup [ref=f1e290]:
                  - row [ref=f1e291]:
                    - columnheader "Tool" [ref=f1e292]
