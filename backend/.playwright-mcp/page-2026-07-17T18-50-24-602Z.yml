      - heading "About the role" [level=2] [ref=f3e60]
      - generic [ref=f3e62]:
        - heading "Edge Computer Vision Engineer for Drones!" [level=1] [ref=f3e63]
        - list [ref=f3e64]:
          - listitem [ref=f3e65]:
            - strong [ref=f3e66]: "Company:"
            - text: Rownd (
            - link "Rownd.ai" [ref=f3e67] [cursor=pointer]:
              - /url: http://Rownd.ai
            - text: /
            - link "arcedge.ai" [ref=f3e68] [cursor=pointer]:
              - /url: http://arcedge.ai
            - text: )
          - listitem [ref=f3e69]:
            - strong [ref=f3e70]: "Position Type:"
            - text: Full-time
          - listitem [ref=f3e71]:
            - strong [ref=f3e72]: "Compensation:"
            - text: Competitive (Salary + Equity, DOE)
          - listitem [ref=f3e73]:
            - strong [ref=f3e74]: "Location:"
            - text: Hybrid-remote (Strong preference for candidates in Raleigh-Durham area, Wisconsin, or other non-traditional tech hubs—outside of SF, NYC, Seattle, etc.)
          - listitem [ref=f3e75]:
            - strong [ref=f3e76]: "Travel:"
            - text: 5-6 weeks of cumulative domestic travel per year (non-continuous, split across ~4 on-site team sessions, client sites, and conventions).
        - heading [level=2] [ref=f3e77]:
          - strong [ref=f3e78]: About Rownd
        - paragraph [ref=f3e79]:
          - text: Rownd is a fast-paced, high-execution technology and hardware startup. We are building
          - strong [ref=f3e80]: 100% autonomous physical assets
          - text: —deploying custom software and hardware systems for defense and commercial sectors to put intelligent machines in the field.
        - paragraph [ref=f3e81]:
          - text: We don't just write software or integrate off-the-shelf parts;
          - strong [ref=f3e82]: we build the full drone
          - text: from the ground up. We operate with extreme autonomy, an aggressive bias for action, and a "just do it" mindset. We don't write software to sit in the cloud; we write software to make physical things navigate, sense, and act in the real world. We are constantly pushing the absolute outer edges of what is physically and computationally possible. If you want to settle for what was state-of-the-art two years ago, Rownd is not the place for you. If you want to see your code fly, you belong here.
        - heading [level=2] [ref=f3e83]:
          - strong [ref=f3e84]: Position Overview
        - paragraph [ref=f3e85]:
          - text: We are looking for our
          - strong [ref=f3e86]: Edge Vision Person
          - text: —an engineer who can design, build, and deploy the visual intelligence that powers our autonomous drones and edge assets.
        - paragraph [ref=f3e87]:
          - text: Because we build the full hardware platform,
          - strong [ref=f3e88]: you have complete ownership over the vision pipeline.
          - text: You aren't handcuffed to someone else's hardware choices; you get to pick the cameras, choose the sensors, select the processor, and design the software stack that gets the job done.
        - paragraph [ref=f3e89]:
          - text: This is not a traditional, slow-paced corporate research role. You won't be training trillion-parameter models on giant server clusters just to write a paper. Instead, you will be designing
          - strong [ref=f3e90]: small, highly-optimized, lightning-fast models
          - text: that live directly on the edge. You will need to be a
          - strong [ref=f3e91]: "\"Jack of trades, and a master of SOME.\""
          - text: We don't expect you to know everything, but we expect you to be world-class at a few core things, completely unafraid to jump into the rest, and highly transparent about where you need to learn.
        - paragraph [ref=f3e92]: You should be highly comfortable using Generative AI and AI coding assistants (GitHub Copilot, Cursor, LLMs) to multiply your output and ship production-grade code rapidly.
        - heading [level=2] [ref=f3e93]:
          - strong [ref=f3e94]: Culture, Trust & Expectations
        - paragraph [ref=f3e95]:
          - text: At Rownd, we maintain a
          - strong [ref=f3e96]: high level of trust and exceptionally high expectations
          - text: .
        - list [ref=f3e97]:
          - listitem [ref=f3e98]:
            - strong [ref=f3e99]: "Figure It Out:"
            - text: You won’t be handed a step-by-step playbook or a list of perfect requirements. You are expected to think outside the box, try wild new things, conduct rapid research, and do whatever it takes to accomplish our goals.
          - listitem [ref=f3e100]:
            - strong [ref=f3e101]: "Comfortable Being Uncomfortable:"
            - text: Startups are fast and chaotic. You must be completely okay with extreme ambiguity, shifting requirements, and rapid change. When things pivot, your instinct should be to adapt and build, not freeze.
          - listitem [ref=f3e102]:
            - strong [ref=f3e103]: "Positive & Collaborative:"
            - text: We are a tight-knit team. We look for people who are additive, collaborative, positive, and genuinely great to work with. No brilliant jerks.
          - listitem [ref=f3e104]:
            - strong [ref=f3e105]: "Hard Work & Real Rest:"
            - text: This is a startup environment pushing hard to make history—it is not a traditional, comfortable 9-to-5. We work intensely when we are on, but we also fiercely protect our team's well-being. We expect you to actually take your time off, unplug, and recharge.
          - listitem [ref=f3e106]:
            - strong [ref=f3e107]: "We work for and with the nation’s Soldiers, Sailors, Marines, and Airmen:"
            - text: Must be willing and happy to provide software, models, and hardware to the Department of War. If you have moral reservations around supplying the US military and government, then this role and company are not for you.
        - heading [level=2] [ref=f3e108]:
          - strong [ref=f3e109]: Key Areas of Responsibility
        - heading [level=3] [ref=f3e110]:
          - strong [ref=f3e111]: Edge Model Design & Deployment (Core Focus)
        - list [ref=f3e112]:
          - listitem [ref=f3e113]:
            - strong [ref=f3e114]: "Full Stack Hardware & Sensor Selection:"
            - text: Research, evaluate, and select optimal camera modules, lenses, optical sensors, and onboard edge compute processors to meet mission requirements.
          - listitem [ref=f3e115]:
            - strong [ref=f3e116]: "Next-Gen Architectures:"
            - text: Implement, optimize, and deploy state-of-the-art vision models (including
            - strong [ref=f3e117]: YOLO variants, CLIP, DINOv2
            - text: ", and newer, more interesting backbones). We expect you to aggressively research and adopt newer stacks rather than defaulting to comfortable, outdated frameworks."
          - listitem [ref=f3e118]:
            - strong [ref=f3e119]: "Small & Fast Deployments:"
            - text: Fine-tune, compress, and quantize models for constrained hardware environments (Tracking, Classification, and Segmentation).
          - listitem [ref=f3e120]:
            - strong [ref=f3e121]: "Multi-Platform Deployment:"
            - text: Target both CUDA-enabled devices (NVIDIA Jetson) and non-CUDA NPUs (Neural Processing Units like Hailo, Rockchip, STM32, or similar edge accelerators).
          - listitem [ref=f3e122]:
            - strong [ref=f3e123]: "Self-Improving Systems:"
            - text: Design feedback loops and pipelines that allow deployed assets to continuously flag edge cases, gather raw data, and self-improve over time.
        - heading [level=3] [ref=f3e124]:
          - strong [ref=f3e125]: Robotic Systems Integration & Adaptability
        - list [ref=f3e126]:
          - listitem [ref=f3e127]:
            - strong [ref=f3e128]: "Cross-Platform Adaptability:"
            - text: While our current focus is aerial hardware, you must be ready and willing to adapt your vision stacks to other land-based, maritime, or custom robotic systems as our hardware ecosystem expands.
          - listitem [ref=f3e129]:
            - strong [ref=f3e130]: "Robust Evaluation Suites:"
            - text: Build rigorous, automated evaluation pipelines to benchmark model performance, latency, accuracy, and power consumption across physical edge devices.
          - listitem [ref=f3e131]:
            - strong [ref=f3e132]: "Synthetic Data Generation:"
            - text: When real-world data is scarce, leverage simulation environments, generative tools, and programmatic pipelines to generate high-fidelity synthetic training data.
        - heading [level=3] [ref=f3e133]:
          - strong [ref=f3e134]: Code, Systems & Hardware Integration
        - list [ref=f3e135]:
          - listitem [ref=f3e136]:
            - strong [ref=f3e137]: "Production-Grade Code:"
            - text: Write clean, modular, and performant C++ and Python code to integrate model outputs directly into drone navigation and control pipelines.
          - listitem [ref=f3e138]:
            - strong [ref=f3e139]: "AI-Assisted Development:"
            - text: Seamlessly integrate AI coding tools into your daily workflow to rapidly draft, document, debug, and iterate.
        - heading [level=3] [ref=f3e140]:
          - strong [ref=f3e141]: Operations & Team Alignment
        - list [ref=f3e142]:
          - listitem [ref=f3e143]:
            - strong [ref=f3e144]: "Daily Standup Sync:"
            - text: Active participation in our daily team standup at
            - strong [ref=f3e145]: 10:30 AM EDT
            - text: . Because we operate as a remote-first team,
            - strong [ref=f3e146]: attending with your camera on
            - text: and ready to actively engage is a strict requirement.
          - listitem [ref=f3e147]:
            - strong [ref=f3e148]: "Extreme Autonomy:"
            - text: Own your work streams end-to-end. We don't micro-manage. We agree on the target, and we expect you to move quickly, iterate, and deliver.
        - heading [level=2] [ref=f3e149]:
          - strong [ref=f3e150]: Candidate Qualifications
        - list [ref=f3e151]:
          - listitem [ref=f3e152]:
            - strong [ref=f3e153]: "US Citizenship:"
            - text: Candidates must be US citizens eligible to obtain and maintain a U.S. Security Clearance (due to our defense work and FCL requirements).
          - listitem [ref=f3e154]:
            - strong [ref=f3e155]: "Edge & NPU Expertise:"
            - text: Hands-on experience deploying CV models to physical hardware, dealing with quantization (INT8/FP16), and optimizing for memory/thermal limits.
          - listitem [ref=f3e156]:
            - strong [ref=f3e157]: "Core Tech Stack:"
            - text: High proficiency in PyTorch/TensorFlow, OpenCV, TensorRT, CUDA, C++, and Python.
          - listitem [ref=f3e158]:
            - strong [ref=f3e159]: "\"Just Do It\" Mentality:"
            - text: You don’t wait for permission. You build a prototype, test it, break it, and fix it. You have a proven track record of "just figuring it out" in highly ambiguous environments.
          - listitem [ref=f3e160]:
            - strong [ref=f3e161]: "Location & Lifestyle:"
            - text: Ideally located in a non-traditional tech hub. We love builders who choose to live, work, and thrive outside the major, overcrowded coastal tech centers.
          - listitem [ref=f3e162]:
            - strong [ref=f3e163]: "Travel Flexibility:"
            - text: Willingness to travel for 4 to 5 weeks cumulatively per year for on-sites, hardware integration, and client field testing.
        - heading [level=2] [ref=f3e164]:
          - strong [ref=f3e165]: Are You a "Jack of all trades, master of SOME"?
        - paragraph [ref=f3e166]: "When you apply, we want to skip the standard corporate fluff. Please include a short note telling us:"
        - list [ref=f3e167]:
          - listitem [ref=f3e168]:
            - strong [ref=f3e169]: What are you absolutely great at?
            - text: (Your "Master of SOME" superpowers—e.g., custom CUDA kernels, synthetic data pipelines, physical NPU integration, synthetic data generation, etc).
          - listitem [ref=f3e170]:
            - strong [ref=f3e171]: Where do you need/want to learn?
            - text: (Where are your gaps, what are you excited to master next on our team, and what newer stacks are you dying to play with?)
        - heading [level=2] [ref=f3e172]:
          - strong [ref=f3e173]: What’s In It For You?
        - list [ref=f3e174]:
          - listitem [ref=f3e175]:
            - strong [ref=f3e176]: "Real-World Impact:"
            - text: Your models will physically control, guide, and protect 100% autonomous drones and robotic systems in the field.
          - listitem [ref=f3e177]:
            - strong [ref=f3e178]: "Hardware Autonomy:"
            - text: The power to pick your own cameras, sensors, and edge-computing setup.
          - listitem [ref=f3e179]:
            - strong [ref=f3e180]: "Defense Tech Credentials:"
            - text: Direct experience building defense-grade, audit-ready AI systems at a rapidly expanding startup.
          - listitem [ref=f3e181]:
            - strong [ref=f3e182]: "Autonomy & Tools:"
            - text: We will equip you with whatever hardware, computing power, and AI developer tools you need to move fast and succeed.
          - listitem [ref=f3e183]:
            - strong [ref=f3e184]: "Ownership:"
            - text: Competitive salary combined with meaningful equity, letting you share directly in Rownd’s growth.
      - heading "About the interview" [level=2] [ref=f3e185]
      - generic [ref=f3e187]:
        - heading [level=2] [ref=f3e188]:
          - strong [ref=f3e189]: "Our Hiring Process: How We Work Together"
        - paragraph [ref=f3e190]: "We hate traditional, slow, whiteboard-style corporate loops as much as you do. We want to see how you build, how you think, and how we collaborate. Here is our direct, transparent 4-step process:"
        - heading [level=3] [ref=f3e191]:
          - strong [ref=f3e192]: "Step 0: The Application"
        - paragraph [ref=f3e193]: Submit your application above and we will get back to you within 24 hours if we want to move forward.
        - heading [level=3] [ref=f3e194]:
          - strong [ref=f3e195]: "Step 1: Show Off"
        - paragraph [ref=f3e196]:
          - text: Bring something cool to show us! A personal project or a public GitHub repo is best. If your professional work is private or locked under an NDA,
          - strong [ref=f3e197]: choose something else to show us instead
          - text: —even if it is only tangentially related to this role. For the show and tell, we value
          - strong [ref=f3e198]: passion over raw technical merit (although we do love seeing cool stuff)
          - text: . We want to see an actual model doing cool stuff and hear you explain what you did that was special, unique, or creative to get it working.
        - heading [level=3] [ref=f3e199]:
          - strong [ref=f3e200]: "Step 2: The Mutual Fit (A Paid Practical Week)"
        - paragraph [ref=f3e201]: We want to ensure you love working with our team before making a long-term commitment. We will pay you to work with us for one week (part-time, ~6-8 hours of work designed to easily fit into your current spare time).
        - list [ref=f3e202]:
          - listitem [ref=f3e203]:
            - strong [ref=f3e204]: "The Project:"
            - text: You will work on a real task—likely training and deploying a small model or building a repeatable vision/data pipeline.
          - listitem [ref=f3e205]:
            - strong [ref=f3e206]: "Open Source:"
            - text: We will open-source the results. You get paid, you keep the code for your portfolio, and we get to see your real-world workflow.
          - listitem [ref=f3e207]:
            - strong [ref=f3e208]: "The Rhythm:"
            - text: If your schedule allows, you will attend our daily standups. If not, we will arrange 2-3 flexible syncs during the week to stay aligned.
        - heading [level=3] [ref=f3e209]:
          - strong [ref=f3e210]: "Step 3: CEO & CTO Vision Chat"
        - paragraph [ref=f3e211]: If we mutually see a fantastic fit, we will have one final chat. This is where we discuss long-term visions—your goals for yourself and the role, and our goals for Rownd and the technology's future.
        - heading [level=3] [ref=f3e212]:
          - strong [ref=f3e213]: "Step 4: Offer & Onboarding"
        - paragraph [ref=f3e214]: If we decide to move forward with an offer, we request an official response within one week, targeting a start date roughly 2-3 weeks later. If the timing or role isn’t a perfect fit right now, we’ll keep the line open for future opportunities as we scale.
