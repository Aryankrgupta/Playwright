        - paragraph [ref=f3e217]: Rownd is a fast-paced, high-execution technology and hardware startup building 100% autonomous physical assets. We deploy custom software and hardware systems for the defense and commercial sectors to put intelligent machines in the field.
        - paragraph [ref=f3e218]: We operate with extreme autonomy, an aggressive bias for action, and a "just do it" mindset. We don't write software to sit in the cloud; we write software to make physical things navigate, sense, and act in the real world. We work intensely to make history alongside the nation's military service members, pushing the outer boundaries of what is computationally possible on the edge.
