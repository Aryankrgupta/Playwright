      - heading "About the role" [level=2] [ref=f3e49]
      - generic [ref=f3e51]:
        - paragraph [ref=f3e52]:
          - strong [ref=f3e53]: WHO WE ARE
        - paragraph [ref=f3e54]:
          - text: Noora Health India Private Limited is a key partner in
          - link "Noora Health’s" [ref=f3e55] [cursor=pointer]:
            - /url: http://www.noorahealth.org/
          - text: mission is to improve outcomes and strengthen health systems by equipping family caregivers with the skills they need to care for their loved ones. They develop content, technology platforms, new products, and strengthen other operational functions that support the scale and impact of Noora Health’s programs.
        - paragraph [ref=f3e56]: "Founded in 2014, Noora Health turns hospital hallways and waiting rooms into classrooms by tapping into the most compassionate resources available for the patient’s care: their own family."
        - paragraph [ref=f3e57]: With support from governments and partners in India, Bangladesh, Indonesia, and Nepal, Noora Health has trained more than 58 million caregivers and patients across 16,300+ facilities using their flagship caregiver education and training curriculum, the Care Companion Program (CCP).
        - paragraph [ref=f3e58]: In a cohort of patients, the CCP reduced post-surgical cardiac complications by 71%, maternal complications by 12%, newborn complications by 16%, and newborn mortality by 18%.
        - paragraph [ref=f3e59]:
          - text: Noora Health is an
          - link "Audacious Project Grantee" [ref=f3e60] [cursor=pointer]:
            - /url: https://blog.ted.com/introducing-the-audacious-projects-new-cohort/
          - text: and received the
          - link "Skoll Foundation Award for Social Innovation" [ref=f3e61] [cursor=pointer]:
            - /url: https://skoll.org/2022/04/04/skoll-foundation-announces-winners-of-the-2022-skoll-award-for-social-innovation/
          - text: . To learn more, watch our
          - link "TED Talk" [ref=f3e62] [cursor=pointer]:
            - /url: https://www.ted.com/talks/edith_elliott_and_shahed_alam_the_most_powerful_untapped_resource_in_health_care
          - text: ","
          - link "Skoll feature" [ref=f3e63] [cursor=pointer]:
            - /url: https://youtu.be/e7qvtubZ7XM
          - text: ", or read about"
          - link "our partnership" [ref=f3e64] [cursor=pointer]:
            - /url: https://www.who.int/news/item/29-07-2025-who-and-noora-health-begin-collaboration-to-strengthen-support-for-family-caregivers
          - text: with the World Health Organization.
        - paragraph [ref=f3e65]:
          - strong [ref=f3e66]: WHAT THE PLATFORMS & ENGINEERING TEAM DOES
        - paragraph [ref=f3e67]: Our Platforms & Engineering team continuously innovates and builds new technology and products to improve health outcomes and save lives. We serve patients and family caregivers across India, Bangladesh, Indonesia, and Nepal throughout their caregiving journeys. We also build solutions for frontline healthcare workers and internal engineering systems that power our larger programmatic work.
        - paragraph [ref=f3e68]:
          - strong [ref=f3e69]: OUR CURRENT STACK
        - paragraph [ref=f3e70]:
          - text: Our backend runs on Python with PostgreSQL on Google Cloud. We deliver our interventions through Exotel,
          - link "Turn.io" [ref=f3e71] [cursor=pointer]:
            - /url: http://Turn.io
          - text: ", RapidPro, other third-party tools, and a growing set of homegrown applications that connect us to caregivers and frontline workers. AI is a first-class part of how we build: we use coding assistants and agents in our day-to-day development, and we are actively building LLM-powered features into our products. We are a growing engineering team with emerging processes, and a meaningful part of this role is helping us refine them towards operational excellence without losing the velocity that a small team can offer."
        - paragraph [ref=f3e72]:
          - strong [ref=f3e73]: WHAT YOU WILL DO
        - paragraph [ref=f3e74]: We are looking for a Lead Engineer who will own the delivery of specific products and run focused engineering pods. This is a hands-on technical role with people management responsibilities. You will spend a meaningful share of your time directly writing code, creating engineering designs, reviewing, debugging, while also setting direction for a small team, growing their craft, and running the operating rhythm that turns plans into shipped products. You will work closely with colleagues across product, design, medical, and data.
        - list [ref=f3e75]:
          - listitem [ref=f3e76]: Own end-to-end delivery for your individual and pods’ roadmap, from scoping and architecture through release and post-release support.
          - listitem [ref=f3e77]: Set technical direction through engineering design reviews, ERDs, and clear written decision records, so engineers (and their AI tools) have a well-scoped spec to work with.
          - listitem [ref=f3e78]: Build with AI as part of the product, not just around it. Identify where LLMs, retrieval, or agentic workflows genuinely improve caregiver and frontline-worker outcomes, and help ship those features.
          - listitem [ref=f3e79]: Write production code on critical paths, lead complex backend or full-stack changes, and stay close enough to the codebase and the associated tooling to make credible technical calls.
          - listitem [ref=f3e80]: "Drive resolution of operational gaps in your area: alerting, on-call, incident response, tech debt, and security and compliance hygiene"
          - listitem [ref=f3e81]: "Stay close to how the craft is changing. Bring back what works from outside the team: new tools, new patterns, new ways of working and help us evolve our processes without losing the fundamentals."
        - paragraph [ref=f3e82]:
          - strong [ref=f3e83]: WHO ARE WE LOOKING FOR
        - list [ref=f3e84]:
          - listitem [ref=f3e85]:
            - emphasis [ref=f3e86]: "A builder/tinkerer first:"
            - text: You have shipped at least one production LLM-powered product end-to-end and have strong opinions about what makes these systems reliable, safe, and actually useful. You are most at home writing code, reading design docs, and debugging, and you have taken on people management because you have found it multiplies what a small team can ship.
          - listitem [ref=f3e87]: 6–12 years of hands-on software engineering experience with a proven track record of shipping production systems end-to-end, ideally including at least one large project where you owned the architecture, the delivery plan, and the team running it.
          - listitem [ref=f3e88]: "Hands-on experience building with LLMs: prompt design, RAG pipelines, agent frameworks, MCPs, and evals. You know how to instrument these systems for quality and post-deployment optimization. AI tools are also native to how you work now."
          - listitem [ref=f3e89]: Strong backend engineering skills in Python (our primary backend language), JavaScript or similar, including API design, data modeling, and query optimization on relational databases.
          - listitem [ref=f3e90]: Comfort working across the stack when needed, with enough familiarity with frontend, mobile, or data pipelines to make sound architectural decisions in a small team.
          - listitem [ref=f3e91]: Working knowledge of cloud platforms such as Google Cloud or AWS, with experience deploying, monitoring, and operating production services.
          - listitem [ref=f3e92]: Strong communication across formats. You document decisions, write clear and simple ERDs, and use writing to align teams rather than relying on meetings.
          - listitem [ref=f3e93]: Comfortable with ambiguity, capable of making decisions with incomplete information, and willing to revisit decisions as facts change.
          - listitem [ref=f3e94]: A Bachelor’s or Master’s degree in a related field or equivalent practical experience.
        - paragraph [ref=f3e95]:
          - strong [ref=f3e96]: WHAT WE VALUE
        - paragraph [ref=f3e97]: We value diversity, equity, and inclusion, and we understand the value of developing a team with different perspectives, educational backgrounds, and life experiences. We prioritize diversity within our team, and we welcome candidates from all gender identities, castes, religious practices, sexual orientations, and abilities — among many others.
        - paragraph [ref=f3e98]:
          - strong [ref=f3e99]: We encourage people from all backgrounds to apply.
        - paragraph [ref=f3e100]:
          - strong [ref=f3e101]: HOW TO APPLY
        - paragraph [ref=f3e102]:
          - text: Please submit your application using
          - link "this link" [ref=f3e103] [cursor=pointer]:
            - /url: https://noorahealth.bamboohr.com/careers/140?source=aWQ9MzQ%3D
          - strong [ref=f3e104]: .
      - heading "About Noora Health" [level=2] [ref=f3e105]
      - paragraph [ref=f3e107]: Noora Health trains patient families with high-impact health skills that improve outcomes and save lives. Our model provides basic yet vital care knowledge through trusted providers by creating a scalable program for caregiving education and training within the established healthcare system. This model expands the care umbrella to include those closest to the patient — their family and community. Noora Health has trained over 30 million caregivers and patients across over 12,400 healthcare facilities in India, Bangladesh, Indonesia, and Nepal. The program reduces cardiac surgery complications by 71%, newborn readmissions by 56%, and neonatal mortality by 18%. By 2028, Noora Health will expand to reach over 70 million caregivers and patients.
