                        - /url: https://github.com/microsoft/playwright
              - paragraph [ref=f1e323]:
                - text: Playwright is an
                - link "open-source" [ref=f1e324] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Open-source
                - text: automation library for browser testing and
                - link "web scraping" [ref=f1e325] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Web_scraping
                - superscript [ref=f1e326]:
                  - link "[3]" [ref=f1e327] [cursor=pointer]:
                    - /url: "#cite_note-3"
                - text: developed by
                - link "Microsoft" [ref=f1e329] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Microsoft
                - superscript [ref=f1e330]:
                  - link "[4]" [ref=f1e331] [cursor=pointer]:
                    - /url: "#cite_note-4"
                - superscript [ref=f1e333]:
                  - link "[5]" [ref=f1e334] [cursor=pointer]:
                    - /url: "#cite_note-5"
                - text: and launched on 31 January 2020, which has since become popular among
                - link "programmers" [ref=f1e336] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Programmer
                - text: and
                - link "web developers" [ref=f1e337] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Web_developer
                - text: .
              - paragraph [ref=f1e338]:
                - text: Playwright provides the ability to automate browser tasks in
                - link "Chromium" [ref=f1e339] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Chromium_(web_browser)
                - text: ","
                - link "Firefox" [ref=f1e340] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Firefox
                - text: ", and"
                - link "WebKit" [ref=f1e341] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/WebKit
                - text: with a single API.
                - superscript [ref=f1e342]:
                  - link "[6]" [ref=f1e343] [cursor=pointer]:
                    - /url: "#cite_note-6"
                - text: It can also operate against branded browsers such as
                - link "Google Chrome" [ref=f1e345] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Google_Chrome
                - text: and
                - link "Microsoft Edge" [ref=f1e346] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Microsoft_Edge
                - text: available on the host machine, although these browsers are not installed by default. The current Playwright version supports Stable, Beta, Dev, and Canary channels of Google Chrome and Microsoft Edge.
                - superscript [ref=f1e347]:
                  - link "[7]" [ref=f1e348] [cursor=pointer]:
                    - /url: "#cite_note-7"
                - text: This allows developers to create reliable end-to-end tests that are capable of running in non-headless mode, as well as in headless mode for automation.
              - paragraph [ref=f1e350]:
                - text: Playwright supports programming languages like
                - link "JavaScript" [ref=f1e351] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/JavaScript
                - text: ","
                - link "Python" [ref=f1e352] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Python_(programming_language)
                - text: ","
                - link "C#" [ref=f1e353] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/C_Sharp_(programming_language)
                - text: and
                - link "Java" [ref=f1e354] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Java_(software_platform)
                - text: ", though its main API was originally written in"
                - link "Node.js" [ref=f1e355] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Node.js
                - text: . It supports all modern web features including network interception and multiple browser contexts and provides automatic waiting, which reduces the flakiness of tests.
            - region [ref=f1e356]:
              - generic [ref=f1e357]:
                - heading "@playwright/test" [level=2] [ref=f1e358]
                - generic [ref=f1e359]:
                  - text: "["
                  - link "edit" [ref=f1e360] [cursor=pointer]:
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=1
                  - text: "]"
              - paragraph [ref=f1e361]:
                - text: "@playwright/test is a test runner with Jest-like assertions"
                - superscript [ref=f1e362]:
                  - link "[8]" [ref=f1e363] [cursor=pointer]:
                    - /url: "#cite_note-8"
                - text: developed and maintained by the Playwright team that is built on top of the Playwright API. This test runner is tightly integrated with Playwright and is specifically designed for end-to-end testing.
                - superscript [ref=f1e365]:
                  - link "[9]" [ref=f1e366] [cursor=pointer]:
                    - /url: "#cite_note-9"
                - text: It has capabilities like browser-specific tests, parallel test execution,
                - superscript [ref=f1e368]:
                  - link "[10]" [ref=f1e369] [cursor=pointer]:
                    - /url: "#cite_note-10"
                - text: rich browser context options, snapshot testing, automatic retries and many more.
            - region [ref=f1e371]:
              - generic [ref=f1e372]:
                - heading "History" [level=2] [ref=f1e373]
                - generic [ref=f1e374]:
                  - text: "["
                  - link "edit" [ref=f1e375] [cursor=pointer]:
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=2
                  - text: "]"
              - paragraph [ref=f1e376]:
                - text: Playwright was announced by Microsoft in January 2020.
                - superscript [ref=f1e377]:
                  - link "[11]" [ref=f1e378] [cursor=pointer]:
                    - /url: "#cite_note-11"
                - text: It was developed to address the need for a unified API for cross-browser testing and to overcome limitations in existing tools like
                - link "Puppeteer" [ref=f1e380] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Puppeteer_(software)
                - text: ","
                - link "Cypress" [ref=f1e381] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Cypress_(software)
                - text: and
                - link "Selenium" [ref=f1e382] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Selenium_(software)
                - text: . A team of engineers, including those who had previously worked on Puppeteer at
                - link "Google" [ref=f1e383] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Google
                - text: ", contributed to its development."
                - superscript [ref=f1e384]:
                  - link "[12]" [ref=f1e385] [cursor=pointer]:
                    - /url: "#cite_note-12"
                - text: Playwright introduced features like automatic waits, multi-browser support, and network interception, making it a powerful tool for modern web testing. Since its inception, it has been actively maintained and has seen rapid growth and adoption in the web testing community.
                - superscript [ref=f1e387]:
                  - link "[13]" [ref=f1e388] [cursor=pointer]:
                    - /url: "#cite_note-13"
              - paragraph [ref=f1e390]: The @playwright/test runner was released later as part of an effort to provide a more comprehensive solution for browser-based testing. Its development was largely based on the need to have a specialized runner that can leverage the full potential of the Playwright API and make end-to-end testing more robust and straightforward.
            - region [ref=f1e391]:
              - generic [ref=f1e392]:
                - heading "Usage and examples" [level=2] [ref=f1e393]
                - generic [ref=f1e394]:
                  - text: "["
                  - link "edit" [ref=f1e395] [cursor=pointer]:
                    - /url: /w/index.php?title=Playwright_(software)&action=edit&section=3
                  - text: "]"
              - paragraph [ref=f1e396]: "Playwright is primarily used for automating browser tasks, which can range from simple page navigation and content scraping to more complex operations like automated form submissions, user interactions and more. For instance, a simple JavaScript code snippet using Playwright might look like:"
              - generic [ref=f1e397]: "const { chromium } = require('playwright'); (async () => { const browser = await chromium.launch(); const page = await browser.newPage(); await page.goto('https://example.com'); await page.screenshot({ path: 'example.png' }); await browser.close(); })();"
              - paragraph [ref=f1e399]:
                - text: In this example, Playwright is used to open a Chromium browser, navigate to
                - code [ref=f1e400]:
                  - link "https://example.com" [ref=f1e401] [cursor=pointer]:
                    - /url: https://example.com
                - text: ", take a screenshot and save it as"
                - code [ref=f1e402]: example.png
                - text: .
              - paragraph [ref=f1e403]: "@playwright/test further extends these capabilities by providing a test runner that allows developers to write and organize their tests in a more structured and scalable manner. An example test using @playwright/test might look like:"
              - generic [ref=f1e404]: "const { test } = require('@playwright/test'); test('basic test', async ({ page }) => { await page.goto('https://example.com'); await expect(page).toHaveTitle('Example Domain'); });"
              - paragraph [ref=f1e406]:
                - text: In this example, a test is written to navigate to
                - code [ref=f1e407]:
                  - link "https://example.com" [ref=f1e408] [cursor=pointer]:
                    - /url: https://example.com
                - text: and check that the title of the page is "Example Domain".
                - superscript [ref=f1e409]:
                  - link "[14]" [ref=f1e410] [cursor=pointer]:
                    - /url: "#cite_note-14"
              - region [ref=f1e412]:
                - generic [ref=f1e413]:
                  - heading "Configuration" [level=3] [ref=f1e414]
                  - generic [ref=f1e415]:
                    - text: "["
                    - link "edit" [ref=f1e416] [cursor=pointer]:
                      - /url: /w/index.php?title=Playwright_(software)&action=edit&section=4
                    - text: "]"
                - paragraph [ref=f1e417]: "Playwright tests can be customized using a configuration file (playwright.config.js) that supports various options including:"
                - list [ref=f1e418]:
                  - listitem [ref=f1e419]: Test timeout settings
                  - listitem [ref=f1e420]: Retry attempts for failed tests
                  - listitem [ref=f1e421]: Screenshot and video capture settings
                  - listitem [ref=f1e422]: Headless mode configuration
                  - listitem [ref=f1e423]: Test parallelization options
                - paragraph [ref=f1e424]: "An example configuration might look like:"
                - generic [ref=f1e425]: "module.exports = { testDir: './tests', timeout: 30000, retries: 2, use: { headless: true, screenshot: 'only-on-failure', video: 'retain-on-failure', }, };"
              - region [ref=f1e427]:
                - generic [ref=f1e428]:
                  - heading "Debugging features" [level=3] [ref=f1e429]
                  - generic [ref=f1e430]:
                    - text: "["
                    - link "edit" [ref=f1e431] [cursor=pointer]:
                      - /url: /w/index.php?title=Playwright_(software)&action=edit&section=5
                    - text: "]"
                - paragraph [ref=f1e432]: "Playwright includes built-in debugging capabilities such as:"
                - list [ref=f1e433]:
                  - listitem [ref=f1e434]: Screenshots captured on test failures
                  - listitem [ref=f1e435]: Video recording of test runs
                  - listitem [ref=f1e436]: Trace viewer for detailed step-by-step analysis
                  - listitem [ref=f1e437]: Debug mode with browser inspector
                  - listitem [ref=f1e438]:
                    - text: Console logs and network request monitoring
                    - superscript [ref=f1e439]:
                      - link "[15]" [ref=f1e440] [cursor=pointer]:
                        - /url: "#cite_note-15"
              - region [ref=f1e442]:
                - generic [ref=f1e443]:
                  - heading "Reporters" [level=3] [ref=f1e444]
                  - generic [ref=f1e445]:
                    - text: "["
                    - link "edit" [ref=f1e446] [cursor=pointer]:
                      - /url: /w/index.php?title=Playwright_(software)&action=edit&section=6
                    - text: "]"
                - paragraph [ref=f1e447]: Reporters in Playwright define how test results are captured, aggregated, and surfaced after execution. They turn raw test events into structured output such as logs, files, dashboards, or external integrations, enabling teams to analyze trends, spot regressions, and debug failures more effectively.
                - paragraph [ref=f1e448]: By centralizing errors, timings, traces, screenshots, and metadata, reporters make it easier to understand why tests failed, not just that they failed.
                - paragraph [ref=f1e449]:
                  - text: Playwright includes built-in reporters
                  - superscript [ref=f1e450]:
                    - link "[16]" [ref=f1e451] [cursor=pointer]:
                      - /url: "#cite_note-16"
                  - text: and exposes a reporter API
                  - superscript [ref=f1e453]:
                    - link "[17]" [ref=f1e454] [cursor=pointer]:
                      - /url: "#cite_note-17"
                  - text: that supports both open-source and commercial implementations, which are listed below.
                - list [ref=f1e456]:
                  - listitem [ref=f1e457]:
                    - link "Monocart Reporter" [ref=f1e458] [cursor=pointer]:
                      - /url: https://github.com/cenfun/monocart-reporter
                  - listitem [ref=f1e459]:
                    - link "Currents" [ref=f1e460] [cursor=pointer]:
                      - /url: https://currents.dev/
                  - listitem [ref=f1e461]:
                    - link "ReportPortal" [ref=f1e462] [cursor=pointer]:
                      - /url: https://reportportal.io/
                  - listitem [ref=f1e463]:
                    - link "Allure Report" [ref=f1e464] [cursor=pointer]:
                      - /url: https://allurereport.org/
              - region [ref=f1e465]:
                - generic [ref=f1e466]:
                  - heading "Usage Trends" [level=3] [ref=f1e467]
                  - generic [ref=f1e468]:
                    - text: "["
                    - link "edit" [ref=f1e469] [cursor=pointer]:
                      - /url: /w/index.php?title=Playwright_(software)&action=edit&section=7
                    - text: "]"
                - paragraph [ref=f1e470]:
                  - text: As of 2025, Playwright is reported to have over 75,000 GitHub stars, more than 20 million NPM
                  - superscript [ref=f1e471]:
                    - link "[18]" [ref=f1e472] [cursor=pointer]:
                      - /url: "#cite_note-18"
                  - text: all‑time downloads, and over 11,000 Stack Overflow questions. It has been described as experiencing the fastest growth in community adoption, GitHub stars, and modern usage among major web testing frameworks.
                - table [ref=f1e474]:
                  - caption [ref=f1e475]: Data Insights (Playwright 2025)
                  - rowgroup [ref=f1e476]:
