                  - generic [ref=f24e898]: Walking On Water is a powerful documentary that captures the hope and redemption found through the miraculous power of God. Featuring compelling stories, emotional testimonies, and stunning biblical reenactments, the film reveals how God's miracle-working power continues to transform lives today. From modern-day believers who have witnessed the impossible to those whose faith was restored through divine encounters, Walking On Water bridges the past and present to show that God's miracles are real, relevant, and alive. Featuring commentary from powerful men and women of faith including Greg Locke, Brian Essary, Jay Caprietta, Mike Abernathy, Lindy-Ann Hopley, and Joshua Botello, the film showcases how God still moves through His people to heal, deliver, and restore. Each voice brings a unique perspective-stories of revival, healing, deliverance, and unshakable faith that remind viewers of the living power of Jesus Christ. Guided by host James Alford, Walking On Water invites viewers to witness the undeniable reality of God's power through stories that transcend time. Venture two thousands years in the past and see the biblical woman with an issue of blood find her way to Jesus and the power of faith to raise Lazarus from the dead. Many amazing stories of healing are told with the insight of commentators. From ancient miracles to modern manifestations, this film delivers a message of hope, faith, and the unstoppable force of divine love that continues to change hearts and lives around the world.
